# Poway Woman's Club — Frontend
# --------------------------------

title: Poway Woman's Club
description: "Serving the Poway community since 1960 — scholarships, arts, civic engagement, and more."
owner_name: Poway-Women-s-Club
github_username: EvanSvetina
github_repo: "pwc"
repository: "Poway-Women-s-Club/pwc"
baseurl: "/pwc"
future: true

# Build settings
incremental: false

remote_theme: jekyll/minima
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-seo-tag

# Minima theme config
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/Poway-Women-s-Club/pwc" }
  nav_pages:
    - navigation/about.md
    - navigation/events.md
    - navigation/blog.html
    - navigation/groups.html
    - navigation/contact.md

# Event scheduling / signup endpoints.
# These are typically Formspree/Google Forms URLs. Leave blank to disable submission.
events_rsvp_form_action: ""
events_meeting_request_form_action: ""

# Public API base URL for calendar/RSVP interactions (Flask backend).
# Example: "http://localhost:5001"
events_api_base_url: "https://pwc.opencodingsociety.com"

exclude:
  - venv
  - venv/**
  - vendor
  - vendor/**
  - vendor/bundle
  - vendor/bundle/**
  - Gemfile
  - Gemfile.lock
  - node_modules
  - tmp
  - log
  - README.md